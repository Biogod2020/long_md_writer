<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Einthoven's Triangle and Cardiac Vector Dynamics</title>
  <desc id="desc">An interactive-style visualization of the cardiac vector M rotating within Einthoven's Triangle, showing scalar projections on Leads I, II, and III.</desc>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&family=JetBrains+Mono&display=swap');

    .bg { fill: #0f172a; }
    .grid { stroke: #1e293b; stroke-width: 1; }
    .triangle-path { fill: none; stroke: #475569; stroke-width: 2; stroke-dasharray: 8 4; opacity: 0.5; }
    .lead-label { fill: #94a3b8; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; }
    .vector-m { stroke: #22d3ee; stroke-width: 4; stroke-linecap: round; filter: url(#glow); }
    .vector-head { fill: #22d3ee; filter: url(#glow); }
    .projection-line { stroke: #fbbf24; stroke-width: 1.5; stroke-dasharray: 4 2; opacity: 0.8; }
    .meter-bg { fill: rgba(30, 41, 59, 0.7); stroke: #334155; }
    .meter-fill { fill: #22d3ee; }
    .meter-text { fill: #f8fafc; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .math-text { fill: #fbbf24; font-family: 'JetBrains Mono', monospace; font-size: 14px; }

    @keyframes rotateVector {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulseLeadI {
      0%, 100% { transform: scaleX(1); }
      25% { transform: scaleX(0); }
      50% { transform: scaleX(-1); }
      75% { transform: scaleX(0); }
    }

    @keyframes pulseLeadII {
      0% { transform: scaleX(0.5); }
      16.6% { transform: scaleX(1); }
      41.6% { transform: scaleX(0); }
      66.6% { transform: scaleX(-1); }
      91.6% { transform: scaleX(0); }
      100% { transform: scaleX(0.5); }
    }

    @keyframes pulseLeadIII {
      0% { transform: scaleX(-0.5); }
      8.3% { transform: scaleX(0); }
      33.3% { transform: scaleX(1); }
      58.3% { transform: scaleX(0); }
      83.3% { transform: scaleX(-1); }
      100% { transform: scaleX(-0.5); }
    }

    .rotating-group {
      transform-origin: 350px 300px;
      animation: rotateVector 10s linear infinite;
    }

    .bar-i { animation: pulseLeadI 10s linear infinite; transform-origin: center; }
    .bar-ii { animation: pulseLeadII 10s linear infinite; transform-origin: center; }
    .bar-iii { animation: pulseLeadIII 10s linear infinite; transform-origin: center; }
  </style>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" class="bg" />
  
  <!-- Subtle Grid -->
  <g class="grid">
    <path d="M 0 100 H 800 M 0 200 H 800 M 0 300 H 800 M 0 400 H 800 M 0 500 H 800" />
    <path d="M 100 0 V 600 M 200 0 V 600 M 300 0 V 600 M 400 0 V 600 M 500 0 V 600 M 600 0 V 600 M 700 0 V 600" />
  </g>

  <!-- Einthoven's Triangle -->
  <g transform="translate(50, 50)">
    <path d="M 100 50 L 500 50 L 300 400 Z" class="triangle-path" />
    
    <!-- Electrodes -->
    <circle cx="100" cy="50" r="6" fill="#ef4444" /> <!-- RA -->
    <circle cx="500" cy="50" r="6" fill="#22d3ee" /> <!-- LA -->
    <circle cx="300" cy="400" r="6" fill="#fbbf24" /> <!-- LL -->
    
    <text x="70" y="40" class="lead-label">RA (-)</text>
    <text x="510" y="40" class="lead-label">LA (+)</text>
    <text x="285" y="430" class="lead-label">LL (+)</text>

    <!-- Lead Labels -->
    <text x="300" y="30" class="lead-label" text-anchor="middle">LEAD I</text>
    <text x="160" y="250" class="lead-label" transform="rotate(-60 160 250)">LEAD II</text>
    <text x="440" y="250" class="lead-label" transform="rotate(60 440 250)">LEAD III</text>
  </g>

  <!-- Central Vector M -->
  <g class="rotating-group">
    <line x1="350" y1="300" x2="450" y2="300" class="vector-m" marker-end="url(#arrowhead)" />
    <text x="460" y="295" class="math-text" font-weight="bold">M⃗</text>
  </g>

  <!-- Dashboard UI -->
  <g transform="translate(580, 80)">
    <rect width="200" height="440" rx="12" class="meter-bg" />
    <text x="100" y="30" class="lead-label" text-anchor="middle" fill="#f8fafc">SCALAR DEFLECTIONS</text>
    
    <!-- Lead I Meter -->
    <g transform="translate(20, 80)">
      <text x="0" y="-10" class="meter-text">LEAD I (0°)</text>
      <rect x="0" y="0" width="160" height="40" rx="4" fill="#1e293b" />
      <line x1="80" y1="0" x2="80" y2="40" stroke="#475569" />
      <rect x="80" y="10" width="60" height="20" class="meter-fill bar-i" />
    </g>

    <!-- Lead II Meter -->
    <g transform="translate(20, 180)">
      <text x="0" y="-10" class="meter-text">LEAD II (60°)</text>
      <rect x="0" y="0" width="160" height="40" rx="4" fill="#1e293b" />
      <line x1="80" y1="0" x2="80" y2="40" stroke="#475569" />
      <rect x="80" y="10" width="60" height="20" class="meter-fill bar-ii" />
    </g>

    <!-- Lead III Meter -->
    <g transform="translate(20, 280)">
      <text x="0" y="-10" class="meter-text">LEAD III (120°)</text>
      <rect x="0" y="0" width="160" height="40" rx="4" fill="#1e293b" />
      <line x1="80" y1="0" x2="80" y2="40" stroke="#475569" />
      <rect x="80" y="10" width="60" height="20" class="meter-fill bar-iii" />
    </g>

    <!-- Mathematical Formula -->
    <g transform="translate(20, 380)">
      <text x="0" y="0" class="math-text" font-size="11">V_L = |M| cos(θ - α_L)</text>
      <text x="0" y="20" class="meter-text" font-size="10" fill="#94a3b8">WCT = (RA + LA + LL) / 3</text>
    </g>
  </g>

  <!-- Center Pivot Point -->
  <circle cx="350" cy="300" r="4" fill="#f8fafc" />
  
  <!-- Clinical Correlation Note -->
  <rect x="50" y="520" width="480" height="50" rx="4" fill="rgba(34, 211, 238, 0.1)" stroke="#22d3ee" stroke-width="1" />
  <text x="70" y="550" class="meter-text" fill="#22d3ee">CLINICAL CORRELATION:</text>
  <text x="215" y="550" class="meter-text" fill="#f8fafc">Vertical vector (90°) → Lead I isoelectric.</text>
</svg>