<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" aria-label="Animated Cardiovascular Electrophysiology Diagram" role="img">
  <title>Advanced Cardiovascular Electrophysiology: Conduction Dynamics</title>
  <desc>A high-fidelity visualization of the cardiac conduction system showing the SA node spark, AV node delay, and Purkinje flash synchronized with an ECG trace.</desc>
  
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="heart-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>
    <clipPath id="heart-clip">
      <path d="M400,120 C300,120 250,200 250,300 C250,450 400,520 400,520 C400,520 550,450 550,300 C550,200 500,120 400,120 Z" />
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@600&display=swap');

    .bg { fill: #0f172a; }
    .grid-line { stroke: #1e293b; stroke-width: 1; }
    .heart-shell { fill: rgba(30, 41, 59, 0.7); stroke: #334155; stroke-width: 2; backdrop-filter: blur(10px); }
    .conduction-path { fill: none; stroke: #334155; stroke-width: 3; stroke-linecap: round; }
    .ecg-base { fill: none; stroke: #1e293b; stroke-width: 2; }
    .ecg-active { fill: none; stroke: #ffffff; stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw-ecg 5s infinite linear; }
    
    .label-text { fill: #94a3b8; font-family: 'Inter', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .math-text { fill: #22d3ee; font-family: 'JetBrains Mono', monospace; font-size: 14px; }

    /* Animation States */
    .spark { fill: #22d3ee; filter: url(#glow-cyan); opacity: 0; }
    .av-segment { stroke: #fbbf24; filter: url(#glow-amber); stroke-dasharray: 50; stroke-dashoffset: 50; }
    .purkinje-segment { stroke: #22d3ee; filter: url(#glow-cyan); stroke-dasharray: 200; stroke-dashoffset: 200; }
    .ventricle-glow { fill: #22d3ee; opacity: 0; }

    @keyframes draw-ecg {
      0% { stroke-dashoffset: 1000; }
      80% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }

    @keyframes sa-pulse {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      5%, 15% { opacity: 1; transform: scale(1.2); }
    }

    @keyframes av-crawl {
      0%, 15% { stroke-dashoffset: 50; opacity: 0; }
      20% { opacity: 1; }
      40% { stroke-dashoffset: 0; opacity: 1; }
      45%, 100% { opacity: 0; }
    }

    @keyframes purkinje-flash {
      0%, 40% { stroke-dashoffset: 200; opacity: 0; }
      42% { opacity: 1; }
      48% { stroke-dashoffset: 0; opacity: 1; }
      55%, 100% { opacity: 0; }
    }

    @keyframes ventricle-activation {
      0%, 45% { opacity: 0; }
      48% { opacity: 0.3; }
      55% { opacity: 0; }
    }

    @keyframes highlight-pr {
      0%, 20% { fill: transparent; }
      21%, 39% { fill: rgba(251, 191, 36, 0.2); }
      40%, 100% { fill: transparent; }
    }

    @keyframes highlight-qrs {
      0%, 41% { fill: transparent; }
      42%, 49% { fill: rgba(34, 211, 238, 0.2); }
      50%, 100% { fill: transparent; }
    }

    .sa-node-anim { animation: sa-pulse 5s infinite; transform-origin: 460px 180px; }
    .av-node-anim { animation: av-crawl 5s infinite; }
    .purkinje-anim { animation: purkinje-flash 5s infinite; }
    .glow-anim { animation: ventricle-activation 5s infinite; }
    .pr-rect { animation: highlight-pr 5s infinite; }
    .qrs-rect { animation: highlight-qrs 5s infinite; }
  </style>

  <!-- Background and Grid -->
  <rect width="800" height="600" class="bg" />
  <g class="grid">
    <path d="M0,450 H800 M0,500 H800 M0,550 H800" class="grid-line" />
    <path d="M100,450 V600 M200,450 V600 M300,450 V600 M400,450 V600 M500,450 V600 M600,450 V600 M700,450 V600" class="grid-line" />
  </g>

  <!-- Heart Anatomy -->
  <g transform="translate(0, -30)">
    <path class="heart-shell" d="M400,120 C300,120 250,200 250,300 C250,450 400,520 400,520 C400,520 550,450 550,300 C550,200 500,120 400,120 Z" />
    
    <!-- Ventricular Glow -->
    <path class="ventricle-glow glow-anim" d="M400,280 L270,320 C270,420 400,500 400,500 L400,280 Z M400,280 L530,320 C530,420 400,500 400,500 L400,280 Z" />

    <!-- Conduction System -->
    <g class="conduction-system">
      <!-- Atrial Pathways -->
      <path d="M460,180 Q430,200 400,240" class="conduction-path" />
      <path d="M460,180 Q490,220 510,280" class="conduction-path" opacity="0.3" />
      
      <!-- AV Node -->
      <circle cx="400" cy="240" r="6" fill="#fbbf24" filter="url(#glow-amber)" />
      <path d="M400,240 L400,280" class="conduction-path av-segment av-node-anim" />
      
      <!-- Purkinje System -->
      <g class="purkinje-anim purkinje-segment">
        <path d="M400,280 L400,380" class="conduction-path" />
        <path d="M400,380 Q380,450 300,430" class="conduction-path" />
        <path d="M400,380 Q420,450 500,430" class="conduction-path" />
        <path d="M400,320 Q350,330 320,380" class="conduction-path" />
        <path d="M400,320 Q450,330 480,380" class="conduction-path" />
      </g>

      <!-- SA Node Spark -->
      <circle cx="460" cy="180" r="8" class="spark sa-node-anim" />
    </g>

    <!-- Labels -->
    <text x="565" y="180" class="label-text">SA Node</text>
    <text x="320" y="245" class="label-text">AV Node</text>
    <text x="415" y="350" class="label-text">Bundle of His</text>
    <text x="400" y="100" class="math-text" text-anchor="middle">\nabla \cdot ( \sigma \nabla \phi ) = I_v</text>
  </g>

  <!-- ECG Section -->
  <g transform="translate(100, 500)">
    <!-- Highlight Overlays -->
    <rect x="65" y="-60" width="55" height="100" class="pr-rect" rx="4" />
    <rect x="120" y="-80" width="40" height="130" class="qrs-rect" rx="4" />

    <!-- Static ECG for Reference -->
    <path d="M0,0 L50,0 Q75,-30 100,0 L120,0 L130,20 L145,-100 L160,30 L170,0 L230,0 Q260,-40 290,0 L400,0" class="ecg-base" />
    
    <!-- Animated ECG Trace -->
    <path d="M0,0 L50,0 Q75,-30 100,0 L120,0 L130,20 L145,-100 L160,30 L170,0 L230,0 Q260,-40 290,0 L400,0" class="ecg-active" pathLength="1000" />
    
    <text x="75" y="40" class="label-text" text-anchor="middle">P</text>
    <text x="145" y="40" class="label-text" text-anchor="middle">QRS</text>
    <text x="260" y="40" class="label-text" text-anchor="middle">T</text>
    
    <!-- Status Indicators -->
    <g transform="translate(450, -20)">
      <rect width="180" height="60" fill="rgba(30, 41, 59, 0.7)" rx="8" stroke="#334155" />
      <text x="10" y="25" class="label-text" style="font-size: 10px;">Phase:</text>
      <text x="10" y="45" class="math-text" id="phase-display">
        <tspan>
          <animate attributeName="opacity" values="1;0;0;0;0" dur="5s" repeatCount="indefinite" />
          ATRIAL DEPOL
        </tspan>
        <tspan dx="-100">
          <animate attributeName="opacity" values="0;1;0;0;0" dur="5s" repeatCount="indefinite" />
          AV DELAY
        </tspan>
        <tspan dx="-85">
          <animate attributeName="opacity" values="0;0;1;0;0" dur="5s" repeatCount="indefinite" />
          VENTRICULAR FLASH
        </tspan>
      </text>
    </g>
  </g>
</svg>