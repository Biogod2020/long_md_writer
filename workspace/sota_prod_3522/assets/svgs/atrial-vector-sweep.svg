<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Atrial Depolarization and P-Wave Formation</title>
  <desc id="desc">An interactive-style visualization showing the SA node firing, the atrial depolarization wavefront, the resulting mean electrical vector, and the synchronized Lead II P-wave trace.</desc>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&family=JetBrains+Mono&display=swap');

    .bg { fill: #0f172a; }
    .grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
    .grid-line-bold { stroke: rgba(255, 255, 255, 0.1); stroke-width: 1.5; }
    
    .atria-outline { fill: rgba(30, 41, 59, 0.7); stroke: rgba(226, 232, 240, 0.2); stroke-width: 2; }
    
    .sa-node { fill: #22d3ee; filter: blur(2px); }
    .sa-glow { fill: #22d3ee; opacity: 0.5; }

    .wavefront {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 4;
      stroke-linecap: round;
      opacity: 0;
      filter: drop-shadow(0 0 8px #22d3ee);
    }

    .p-vector {
      stroke: #22d3ee;
      stroke-width: 4;
      fill: #22d3ee;
      opacity: 0;
    }

    .ecg-path-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 2; }
    .ecg-trace {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      filter: drop-shadow(0 0 4px #22d3ee);
    }

    .label-text { fill: #94a3b8; font-family: 'Inter', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .math-text { fill: #22d3ee; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* Animations */
    @keyframes pulse-sa {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.5); opacity: 1; }
    }

    @keyframes wave-expand {
      0% { transform: scale(0.1); opacity: 0; stroke-width: 10; }
      20% { opacity: 0.8; }
      70% { transform: scale(1.5); opacity: 0; stroke-width: 2; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    @keyframes vector-grow {
      0% { transform: scale(0) rotate(0deg); opacity: 0; }
      15% { transform: scale(0.2) rotate(10deg); opacity: 0.5; }
      40% { transform: scale(1) rotate(45deg); opacity: 1; }
      70% { transform: scale(0.2) rotate(60deg); opacity: 0; }
      100% { transform: scale(0) rotate(60deg); opacity: 0; }
    }

    @keyframes trace-draw {
      0% { stroke-dashoffset: 1000; }
      10% { stroke-dashoffset: 1000; }
      70% { stroke-dashoffset: 750; }
      90% { stroke-dashoffset: 750; opacity: 1; }
      100% { stroke-dashoffset: 750; opacity: 0; }
    }

    .anim-sa { animation: pulse-sa 3s infinite; transform-origin: 480px 140px; }
    .anim-wave { animation: wave-expand 3s infinite; transform-origin: 480px 140px; }
    .anim-vector { animation: vector-grow 3s infinite; transform-origin: 400px 220px; }
    .anim-trace { animation: trace-draw 3s infinite; }
  </style>

  <defs>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    
    <clipPath id="atria-clip">
      <path d="M 400 120 C 320 120 280 180 280 240 C 280 320 360 360 400 360 C 440 360 520 320 520 240 C 520 180 480 120 400 120 Z" />
    </clipPath>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="600" class="bg" />
  
  <!-- Grid -->
  <g id="grid">
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" class="grid-line" />
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)" />
      <path d="M 100 0 L 0 0 0 100" fill="none" class="grid-line-bold" />
    </pattern>
    <rect width="800" height="600" fill="url(#grid)" />
  </g>

  <!-- Atrial Anatomy -->
  <g id="anatomy" transform="translate(0, -20)">
    <path class="atria-outline" d="M 400 120 C 320 120 280 180 280 240 C 280 320 360 360 400 360 C 440 360 520 320 520 240 C 520 180 480 120 400 120 Z" />
    
    <!-- Internal Septum hint -->
    <path d="M 400 120 L 400 360" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Wavefront Animation -->
    <g clip-path="url(#atria-clip)">
      <circle class="wavefront anim-wave" cx="480" cy="140" r="200" />
      <circle class="wavefront anim-wave" cx="480" cy="140" r="200" style="animation-delay: 0.2s" />
      <circle class="wavefront anim-wave" cx="480" cy="140" r="200" style="animation-delay: 0.4s" />
    </g>

    <!-- SA Node -->
    <circle class="sa-glow anim-sa" cx="480" cy="140" r="8" />
    <circle class="sa-node" cx="480" cy="140" r="4" />
    
    <!-- Mean P-Vector -->
    <line class="p-vector anim-vector" x1="400" y1="220" x2="340" y2="300" marker-end="url(#arrowhead)" />
    
    <text x="500" y="130" class="label-text" style="font-size: 10px;">SA Node</text>
    <text x="310" y="280" class="math-text anim-vector">Σ p&#8407;</text>
  </g>

  <!-- ECG Dashboard -->
  <g transform="translate(100, 450)">
    <rect width="600" height="120" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="rgba(255,255,255,0.1)" />
    <text x="20" y="30" class="label-text">Lead II Trace</text>
    <text x="520" y="30" class="math-text">II = LL - RA</text>
    
    <!-- Baseline -->
    <line x1="50" y1="80" x2="550" y2="80" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <!-- P-Wave Path -->
    <!-- We define a path that includes the P-wave -->
    <path id="p-wave-path" class="ecg-trace anim-trace" d="M 50 80 L 200 80 Q 250 30 300 80 L 550 80" />
    
    <!-- Indicator for peak -->
    <circle r="3" fill="#fbbf24" class="anim-trace">
        <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
            <mpath href="#p-wave-path"/>
        </animateMotion>
    </circle>
  </g>

  <!-- Labels -->
  <text x="400" y="50" class="label-text" text-anchor="middle" style="font-size: 18px; fill: #fff;">Atrial Depolarization Dynamics</text>
  <text x="400" y="75" class="math-text" text-anchor="middle">∇²Φ = -Iᵥ / σ</text>

  <!-- Legend -->
  <g transform="translate(620, 100)">
    <circle cx="0" cy="0" r="5" fill="#22d3ee" />
    <text x="15" y="5" class="label-text" style="font-size: 10px;">Depolarization</text>
    
    <line x1="-5" y1="25" x2="10" y2="25" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="15" y="30" class="label-text" style="font-size: 10px;">Mean Vector</text>
  </g>
</svg>