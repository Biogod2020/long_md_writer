<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" aria-label="Interactive Cardiovascular Electrophysiology Dashboard" role="img">
  <title>Ventricular Action Potential and Pharmacological Modulation</title>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="glass-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
    <clipPath id="graph-clip">
      <rect x="50" y="80" width="300" height="250" rx="8" />
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&family=JetBrains+Mono&display=swap');
    
    .text-header { font-family: 'Inter', sans-serif; fill: #f8fafc; font-size: 18px; font-weight: 600; }
    .text-label { font-family: 'JetBrains Mono', monospace; fill: #94a3b8; font-size: 10px; }
    .text-value { font-family: 'JetBrains Mono', monospace; fill: #22d3ee; font-size: 12px; }
    
    .panel { fill: rgba(30, 41, 59, 0.7); stroke: rgba(255, 255, 255, 0.1); stroke-width: 1; }
    .grid-line { stroke: rgba(148, 163, 184, 0.1); stroke-width: 1; }
    
    /* Action Potential Path Animation */
    @keyframes ap-cycle {
      0%, 20% { d: path('M 60 300 H 90 L 95 120 L 115 140 H 190 L 250 300 H 300'); stroke: #22d3ee; } /* Normal */
      30%, 50% { d: path('M 60 300 H 90 L 130 120 L 150 140 H 210 L 270 300 H 300'); stroke: #ef4444; } /* Class I - Slow Phase 0 */
      60%, 80% { d: path('M 60 300 H 90 L 95 120 L 115 140 H 190 L 330 300 H 350'); stroke: #fbbf24; } /* Class III - Long Phase 3 */
      90%, 100% { d: path('M 60 300 H 90 L 95 120 L 115 140 H 190 L 250 300 H 300'); stroke: #22d3ee; }
    }
    
    /* ECG Path Animation */
    @keyframes ecg-cycle {
      0%, 20% { d: path('M 450 300 H 480 Q 490 280 500 300 H 510 L 515 310 L 525 250 L 535 310 L 540 300 H 570 Q 600 270 630 300 H 670'); } /* Normal */
      30%, 50% { d: path('M 450 300 H 480 Q 490 280 500 300 H 505 L 515 315 L 535 245 L 555 315 L 565 300 H 570 Q 600 270 630 300 H 670'); } /* Wide QRS */
      60%, 80% { d: path('M 450 300 H 480 Q 490 280 500 300 H 510 L 515 310 L 525 250 L 535 310 L 540 300 H 620 Q 650 270 680 300 H 720'); } /* Long QT */
      90%, 100% { d: path('M 450 300 H 480 Q 490 280 500 300 H 510 L 515 310 L 525 250 L 535 310 L 540 300 H 570 Q 600 270 630 300 H 670'); }
    }

    /* Slider Thumb Animation */
    @keyframes slider-1 {
      0%, 20% { transform: translateX(0); }
      30%, 50% { transform: translateX(40px); }
      60%, 100% { transform: translateX(0); }
    }
    @keyframes slider-3 {
      0%, 50% { transform: translateX(0); }
      60%, 80% { transform: translateX(60px); }
      90%, 100% { transform: translateX(0); }
    }

    .ap-trace { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; animation: ap-cycle 10s infinite ease-in-out; filter: drop-shadow(0 0 8px currentColor); }
    .ecg-trace { fill: none; stroke: #22d3ee; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; animation: ecg-cycle 10s infinite ease-in-out; }
    .slider-thumb-1 { animation: slider-1 10s infinite ease-in-out; }
    .slider-thumb-3 { animation: slider-3 10s infinite ease-in-out; }
    
    .scanline { stroke: rgba(34, 211, 238, 0.2); stroke-width: 1; animation: scan 4s linear infinite; }
    @keyframes scan { from { transform: translateX(0); } to { transform: translateX(300px); } }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-grad)" />
  
  <!-- Header -->
  <text x="30" y="45" class="text-header">VENTRICULAR ELECTROPHARMACOLOGY</text>
  <rect x="30" y="55" width="740" height="1" fill="rgba(255,255,255,0.1)" />

  <!-- Action Potential Panel -->
  <rect x="30" y="80" width="370" height="280" rx="12" class="panel" />
  <text x="45" y="105" class="text-label" style="fill: #22d3ee;">PHASE 0-4: VENTRICULAR AP</text>
  
  <!-- AP Grid -->
  <g transform="translate(45, 120)">
    <line x1="0" y1="0" x2="340" y2="0" class="grid-line" />
    <line x1="0" y1="60" x2="340" y2="60" class="grid-line" />
    <line x1="0" y1="120" x2="340" y2="120" class="grid-line" />
    <line x1="0" y1="180" x2="340" y2="180" class="grid-line" />
    <text x="-10" y="185" class="text-label" text-anchor="end">-90mV</text>
    <text x="-10" y="5" class="text-label" text-anchor="end">+20mV</text>
  </g>
  
  <path class="ap-trace" d="M 60 300 H 90 L 95 120 L 115 140 H 190 L 250 300 H 300" />
  
  <!-- Phase Labels -->
  <text x="95" y="110" class="text-label">0</text>
  <text x="120" y="130" class="text-label">1</text>
  <text x="160" y="130" class="text-label">2</text>
  <text x="230" y="220" class="text-label">3</text>
  <text x="70" y="315" class="text-label">4</text>

  <!-- ECG Panel -->
  <rect x="415" y="80" width="355" height="280" rx="12" class="panel" />
  <text x="430" y="105" class="text-label" style="fill: #fbbf24;">SURFACE ECG CORRELATION</text>
  
  <g transform="translate(430, 120)">
    <rect x="0" y="0" width="325" height="220" fill="rgba(0,0,0,0.2)" rx="4" />
    <!-- Grid -->
    <path d="M 0 180 H 325 M 0 150 H 325 M 0 120 H 325 M 0 90 H 325" class="grid-line" />
  </g>
  
  <path class="ecg-trace" d="M 450 300 H 480 Q 490 280 500 300 H 510 L 515 310 L 525 250 L 535 310 L 540 300 H 570 Q 600 270 630 300 H 670" />

  <!-- Control Panel (Sliders) -->
  <rect x="30" y="375" width="740" height="100" rx="12" class="panel" />
  
  <!-- Class I Slider -->
  <g transform="translate(60, 410)">
    <text x="0" y="-10" class="text-label">CLASS I (Na+ BLOCK)</text>
    <rect x="0" y="0" width="150" height="4" rx="2" fill="#334155" />
    <circle cx="10" cy="2" r="6" fill="#ef4444" class="slider-thumb-1" />
  </g>
  
  <!-- Class II Slider -->
  <g transform="translate(240, 410)">
    <text x="0" y="-10" class="text-label">CLASS II (BETA BLOCK)</text>
    <rect x="0" y="0" width="150" height="4" rx="2" fill="#334155" />
    <circle cx="10" cy="2" r="6" fill="#94a3b8" />
  </g>
  
  <!-- Class III Slider -->
  <g transform="translate(420, 410)">
    <text x="0" y="-10" class="text-label">CLASS III (K+ BLOCK)</text>
    <rect x="0" y="0" width="150" height="4" rx="2" fill="#334155" />
    <circle cx="10" cy="2" r="6" fill="#fbbf24" class="slider-thumb-3" />
  </g>
  
  <!-- Class IV Slider -->
  <g transform="translate(600, 410)">
    <text x="0" y="-10" class="text-label">CLASS IV (Ca2+ BLOCK)</text>
    <rect x="0" y="0" width="150" height="4" rx="2" fill="#334155" />
    <circle cx="10" cy="2" r="6" fill="#94a3b8" />
  </g>

  <!-- Clinical Correlation Callout -->
  <g transform="translate(430, 130)">
    <rect x="180" y="10" width="130" height="50" rx="4" fill="rgba(34, 211, 238, 0.1)" stroke="#22d3ee" stroke-dasharray="2 2" />
    <text x="185" y="25" class="text-label" style="fill: #22d3ee; font-size: 8px;">CLINICAL INSIGHT:</text>
    <text x="185" y="38" class="text-label" style="fill: #f8fafc; font-size: 7px;">Phase 0 slope determines</text>
    <text x="185" y="48" class="text-label" style="fill: #f8fafc; font-size: 7px;">conduction velocity (dV/dt).</text>
  </g>

</svg>