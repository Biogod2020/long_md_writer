<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" aria-label="Visualization of Cardiac Re-entry Mechanism" role="img">
  <title>Advanced Cardiovascular Electrophysiology: Re-entry Circuit</title>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="scar-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-color="#ef4444" flood-opacity="0.5" result="color" />
      <feComposite in="color" in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
    <clipPath id="ecg-clip">
      <rect x="100" y="420" width="600" height="120" rx="8" />
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@600&amp;display=swap');

    .bg { fill: #0f172a; }
    .grid { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
    .circuit-path { fill: none; stroke: rgba(34, 211, 238, 0.1); stroke-width: 12; stroke-linecap: round; }
    .scar { fill: rgba(30, 41, 59, 0.8); stroke: #ef4444; stroke-width: 2; filter: url(#scar-glow); }
    
    .pulse {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 80 400;
      animation: re-entry-loop 2s linear infinite;
      filter: url(#glow);
    }

    .ecg-line {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 2;
      animation: ecg-scroll 2s linear infinite;
    }

    .label-text { fill: #94a3b8; font-family: 'Inter', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .math-text { fill: #22d3ee; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
    .warning-text { fill: #ef4444; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; }

    @keyframes re-entry-loop {
      from { stroke-dashoffset: 480; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes ecg-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-120px); }
    }

    .glass-panel { fill: rgba(30, 41, 59, 0.7); stroke: rgba(255, 255, 255, 0.1); }
  </style>

  <!-- Background and Grid -->
  <rect class="bg" width="800" height="600" />
  <g class="grid">
    <path d="M 0 100 H 800 M 0 200 H 800 M 0 300 H 800 M 0 400 H 800 M 0 500 H 800" />
    <path d="M 100 0 V 600 M 200 0 V 600 M 300 0 V 600 M 400 0 V 600 M 500 0 V 600 M 600 0 V 600 M 700 0 V 600" />
  </g>

  <!-- Header -->
  <text x="40" y="50" class="label-text" style="fill: #f8fafc; font-size: 18px;">Electrophysiological Re-entry Model</text>
  <text x="40" y="75" class="label-text">Condition: Decreased Conduction Velocity (θ) &amp; Shortened λ</text>

  <!-- Conduction Circuit -->
  <g transform="translate(400, 240)">
    <!-- Central Scar -->
    <ellipse class="scar" cx="0" cy="0" rx="50" ry="80" />
    <text x="-25" y="5" class="warning-text">SCAR</text>
    
    <!-- Anatomical Paths -->
    <path id="circuit" class="circuit-path" d="M 0 -120 C 100 -120 100 120 0 120 C -100 120 -100 -120 0 -120" />
    
    <!-- Animated Pulse -->
    <path class="pulse" d="M 0 -120 C 100 -120 100 120 0 120 C -100 120 -100 -120 0 -120" />
    
    <!-- Vectors and Labels -->
    <line x1="110" y1="-50" x2="110" y2="50" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" />
    <text x="120" y="0" class="math-text" style="fill: #fbbf24;">λ = θ × ERP</text>
  </g>

  <!-- ECG Monitor Panel -->
  <g transform="translate(0, 20)">
    <rect class="glass-panel" x="100" y="400" width="600" height="140" rx="12" />
    <text x="115" y="425" class="label-text" style="font-size: 10px;">Lead II - Monotonous Tachycardia</text>
    
    <g clip-path="url(#ecg-clip)">
      <g class="ecg-line-group">
        <!-- Repeating Tachycardia Pattern -->
        <path class="ecg-line" d="M 100 490 L 120 490 L 125 470 L 130 510 L 135 440 L 140 490 L 160 490 L 165 470 L 170 510 L 175 440 L 180 490 L 200 490 L 205 470 L 210 510 L 215 440 L 220 490 L 240 490 L 245 470 L 250 510 L 255 440 L 260 490 L 280 490 L 285 470 L 290 510 L 295 440 L 300 490 L 320 490 L 325 470 L 330 510 L 335 440 L 340 490 L 360 490 L 365 470 L 370 510 L 375 440 L 380 490 L 400 490 L 405 470 L 410 510 L 415 440 L 420 490 L 440 490 L 445 470 L 450 510 L 455 440 L 460 490 L 480 490 L 485 470 L 490 510 L 495 440 L 500 490 L 520 490 L 525 470 L 530 510 L 535 440 L 540 490 L 560 490 L 565 470 L 570 510 L 575 440 L 580 490 L 600 490 L 605 470 L 610 510 L 615 440 L 620 490 L 640 490 L 645 470 L 650 510 L 655 440 L 660 490 L 680 490 L 685 470 L 690 510 L 695 440 L 700 490 L 720 490 L 725 470 L 730 510 L 735 440 L 740 490 L 760 490 L 765 470 L 770 510 L 775 440 L 780 490 L 800 490 L 805 470 L 810 510 L 815 440 L 820 490" />
      </g>
    </g>
    
    <!-- Baseline -->
    <line x1="100" y1="490" x2="700" y2="490" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4 4" />
  </g>

  <!-- UI Controls Simulation -->
  <g transform="translate(550, 50)">
    <rect class="glass-panel" width="210" height="80" rx="8" />
    <text x="15" y="25" class="label-text" style="font-size: 10px;">Conduction Velocity (θ)</text>
    <rect x="15" y="35" width="180" height="4" rx="2" fill="#1e293b" />
    <rect x="15" y="35" width="60" height="4" rx="2" fill="#22d3ee" />
    <circle cx="75" cy="37" r="6" fill="#f8fafc" />
    
    <text x="15" y="60" class="math-text" style="font-size: 12px;">θ = 0.45 m/s</text>
    <text x="120" y="60" class="warning-text" style="font-size: 10px;">CRITICAL BLOCK</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 560)">
    <circle cx="0" cy="0" r="4" fill="#22d3ee" />
    <text x="12" y="4" class="label-text" style="font-size: 9px;">Depolarization Wavefront</text>
    
    <circle cx="180" cy="0" r="4" fill="#ef4444" />
    <text x="192" y="4" class="label-text" style="font-size: 9px;">Inexcitable Fibrosis</text>
  </g>

  <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24" />
  </marker>
</svg>