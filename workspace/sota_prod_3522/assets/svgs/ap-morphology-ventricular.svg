<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" aria-label="Interactive Cardiac Action Potential Diagram" role="img">
  <title>Advanced Cardiovascular Electrophysiology: Action Potential Phases</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&family=JetBrains+Mono&display=swap');
      
      .bg-deep { fill: #0f172a; }
      .grid-line { stroke: rgba(148, 163, 184, 0.1); stroke-width: 1; }
      .axis-label { fill: #94a3b8; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .phase-label { fill: #f8fafc; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; opacity: 0; animation: fadeIn 0.5s forwards; }
      
      .ap-curve {
        fill: none;
        stroke: url(#apGradient);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: drawPath 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .ion-na { stroke: #22d3ee; stroke-width: 2; fill: rgba(34, 211, 238, 0.1); opacity: 0; animation: ionPulseNa 4s infinite; }
      .ion-ca { stroke: #fbbf24; stroke-width: 2; fill: rgba(251, 191, 36, 0.1); opacity: 0; animation: ionPulseCa 4s infinite; }
      .ion-k { stroke: #818cf8; stroke-width: 2; fill: rgba(129, 140, 248, 0.1); opacity: 0; animation: ionPulseK 4s infinite; }

      .scan-line {
        stroke: #ffffff;
        stroke-width: 1;
        stroke-dasharray: 4 2;
        animation: scanMove 4s linear infinite;
      }

      @keyframes drawPath {
        0% { stroke-dashoffset: 2000; }
        40%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes scanMove {
        0% { transform: translateX(0); opacity: 0; }
        5% { opacity: 1; }
        40%, 100% { transform: translateX(600px); opacity: 0; }
      }

      @keyframes ionPulseNa {
        5% { opacity: 0; }
        8% { opacity: 1; }
        12% { opacity: 0; }
      }

      @keyframes ionPulseCa {
        15% { opacity: 0; }
        25% { opacity: 1; }
        35% { opacity: 0; }
      }

      @keyframes ionPulseK {
        20% { opacity: 0; }
        35% { opacity: 1; }
        45% { opacity: 0; }
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      .glass-panel { fill: rgba(30, 41, 59, 0.7); }
    </style>

    <linearGradient id="apGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="20%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="80%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background and Grid -->
  <rect width="800" height="500" class="bg-deep" />
  <g class="grid">
    <line x1="100" y1="50" x2="100" y2="450" class="grid-line" />
    <line x1="100" y1="450" x2="750" y2="450" class="grid-line" />
    <!-- Horizontal Grid -->
    <line x1="100" y1="100" x2="750" y2="100" class="grid-line" />
    <line x1="100" y1="200" x2="750" y2="200" class="grid-line" />
    <line x1="100" y1="300" x2="750" y2="300" class="grid-line" />
    <line x1="100" y1="400" x2="750" y2="400" class="grid-line" />
  </g>

  <!-- Axes Labels -->
  <text x="50" y="105" class="axis-label">+20 mV</text>
  <text x="50" y="205" class="axis-label">0 mV</text>
  <text x="50" y="405" class="axis-label">-90 mV</text>
  <text x="400" y="480" class="axis-label">Time (ms)</text>

  <!-- Ion Conductance Overlays (Background) -->
  <path d="M 155 420 L 165 80 L 175 420 Z" class="ion-na" />
  <path d="M 190 420 C 250 150, 350 150, 400 420 Z" class="ion-ca" />
  <path d="M 220 420 C 350 400, 450 100, 520 420 Z" class="ion-k" />

  <!-- Action Potential Curve -->
  <path id="apPath" class="ap-curve" filter="url(#glow)"
    d="M 100 420 
       L 150 420 
       L 165 60 
       L 190 110 
       C 250 115, 380 130, 410 160 
       C 450 220, 500 420, 530 420 
       L 700 420" />

  <!-- Scanning Indicator -->
  <line x1="100" y1="50" x2="100" y2="450" class="scan-line" />

  <!-- Phase Indicators -->
  <g filter="url(#glow)">
    <text x="110" y="440" class="phase-label" style="animation-delay: 0.2s">Phase 4</text>
    <text x="155" y="50" class="phase-label" style="animation-delay: 0.6s">0</text>
    <text x="195" y="100" class="phase-label" style="animation-delay: 0.8s">1</text>
    <text x="300" y="110" class="phase-label" style="animation-delay: 1.2s">Phase 2 (Plateau)</text>
    <text x="470" y="300" class="phase-label" style="animation-delay: 1.8s">3</text>
  </g>

  <!-- Legend Panel -->
  <rect x="580" y="50" width="180" height="120" rx="8" class="glass-panel" />
  <g transform="translate(600, 80)">
    <circle cx="0" cy="0" r="5" fill="#22d3ee" />
    <text x="15" y="5" class="axis-label" style="fill: #22d3ee">Na+ Influx (I_Na)</text>
    
    <circle cx="0" cy="30" r="5" fill="#fbbf24" />
    <text x="15" y="35" class="axis-label" style="fill: #fbbf24">Ca2+ Influx (I_CaL)</text>
    
    <circle cx="0" cy="60" r="5" fill="#818cf8" />
    <text x="15" y="65" class="axis-label" style="fill: #818cf8">K+ Efflux (I_Kr/Ks)</text>
  </g>

  <!-- Clinical Correlation Callout -->
  <rect x="100" y="10" width="280" height="30" rx="4" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" />
  <text x="115" y="30" class="axis-label" style="fill: #ef4444; font-weight: bold;">CRITICAL: Phase 2 determines Refractory Period</text>
</svg>